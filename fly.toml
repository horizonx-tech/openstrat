app = "openstrat-web"
primary_region = "nrt"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile.web"

[env]
  NODE_ENV = "production"
  OPENSTRAT_APP_ENV = "production"
  OPENSTRAT_AGENT_RUNTIME_ENABLED = "false"
  NEXT_PUBLIC_NETWORK_TYPE = "testnet"
  NEXT_PUBLIC_HYPER_EVM_RPC_URL = "https://rpcs.chain.link/hyperevm/testnet"
  NEXT_PUBLIC_HYPER_EVM_MAINNET_RPC_URL = "https://rpc.hyperliquid.xyz/evm"
  NEXT_PUBLIC_HYPER_EVM_TESTNET_RPC_URL = "https://rpcs.chain.link/hyperevm/testnet"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
